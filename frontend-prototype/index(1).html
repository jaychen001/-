<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>工程项目自动审批与进度管控 Demo</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/antd@4.24.16/dist/antd.min.css" />
    <style>
      :root {
        --bg: #f4f7fb;
        --nav: #111827;
        --nav-active: #1d4ed8;
        --line: #e5e7eb;
        --muted: #667085;
        --title: #101828;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      }

      #root,
      .app-layout {
        min-height: 100vh;
      }

      .app-sider {
        position: relative;
        background: var(--nav);
        box-shadow: 4px 0 18px rgba(15, 23, 42, 0.18);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        height: 74px;
        padding: 0 18px;
        color: #fff;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }

      .brand-mark {
        display: grid;
        width: 40px;
        height: 40px;
        place-items: center;
        border-radius: 8px;
        color: #12376f;
        font-size: 18px;
        font-weight: 800;
        background: #dbeafe;
      }

      .brand-title {
        font-size: 17px;
        font-weight: 800;
      }

      .brand-subtitle,
      .user-role {
        margin-top: 3px;
        color: rgba(255, 255, 255, 0.58);
        font-size: 12px;
      }

      .app-sider .ant-menu {
        padding-top: 8px;
        background: transparent;
      }

      .app-sider .ant-menu-item {
        margin: 4px 12px;
        width: calc(100% - 24px);
        border-radius: 8px;
      }

      .app-sider .ant-menu-item-selected {
        background: var(--nav-active) !important;
      }

      .user-block {
        position: absolute;
        right: 14px;
        bottom: 14px;
        left: 14px;
        display: flex;
        gap: 10px;
        align-items: center;
        padding: 13px;
        color: #fff;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.08);
      }

      .app-header {
        height: auto;
        padding: 18px 28px;
        background: #fff;
        border-bottom: 1px solid var(--line);
      }

      .header-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 18px;
      }

      .page-title {
        margin: 0;
        color: var(--title);
        font-size: 23px;
        font-weight: 800;
      }

      .page-subtitle {
        margin-top: 6px;
        color: var(--muted);
        line-height: 1.5;
      }

      .app-content {
        padding: 22px 28px 38px;
      }

      .metric-card {
        border-radius: 8px;
      }

      .metric-card .ant-statistic-title {
        color: var(--muted);
      }

      .content-card,
      .toolbar-card {
        border-radius: 8px;
      }

      .toolbar-card {
        margin-bottom: 16px;
      }

      .content-card + .content-card {
        margin-top: 16px;
      }

      .table-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .auto-strip {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 16px;
      }

      .project-card {
        height: 100%;
      }

      .project-card h3 {
        margin: 0 0 6px;
        font-size: 16px;
        font-weight: 800;
      }

      .muted {
        color: var(--muted);
      }

      .detail-grid {
        display: grid;
        grid-template-columns: minmax(0, 1.1fr) minmax(360px, 0.9fr);
        gap: 16px;
      }

      .compare-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
      }

      .compare-box {
        min-height: 118px;
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #f8fafc;
      }

      .compare-label {
        margin-bottom: 8px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
      }

      .version-badge {
        display: inline-flex;
        align-items: center;
        min-height: 24px;
        padding: 0 8px;
        color: #175cd3;
        font-weight: 700;
        border-radius: 999px;
        background: #eff6ff;
      }

      .drawer-section + .drawer-section {
        margin-top: 16px;
      }

      @media (max-width: 1100px) {
        .app-sider {
          display: none;
        }

        .header-row,
        .detail-grid,
        .compare-grid {
          display: grid;
        }

        .app-header,
        .app-content {
          padding-right: 16px;
          padding-left: 16px;
        }
      }
    </style>

      function ProjectChangeList({ changes, setRoute, setCurrentChange }) {
        const columns = [
          { title: "变更编号", dataIndex: "no", width: 150, fixed: "left" },
          { title: "关联项目", dataIndex: "project", width: 190 },
          { title: "变更标题", dataIndex: "title", width: 260 },
          { title: "变更类型", dataIndex: "type", width: 130 },
          { title: "变更前", dataIndex: "before", width: 190 },
          { title: "变更后", dataIndex: "after", width: 190 },
          { title: "变更原因", dataIndex: "reason", width: 220 },
          { title: "申请人", dataIndex: "applicant", width: 90 },
          { title: "当前状态", dataIndex: "status", width: 110, render: (v) => <StatusTag status={v} /> },
          { title: "操作", width: 160, fixed: "right", render: (_, record) => <Space><Button size="small" onClick={() => { setCurrentChange(record); setRoute("projectChangeDetail"); }}>查看</Button><Button size="small" type="primary" onClick={() => setRoute("projectChangeForm")}>新建</Button></Space> },
        ];
        return (
          <>
            <Toolbar type="change" />
            <Card className="content-card" title="项目信息变更记录" extra={<Button type="primary" onClick={() => setRoute("projectChangeForm")}>发起项目信息变更</Button>}>
              <Table columns={columns} dataSource={changes} scroll={{ x: 1720 }} />
            </Card>
          </>
        );
      }

      function ProjectChangeForm({ setRoute }) {
        return (
          <Card className="content-card" title="项目信息变更表单" extra={<Button onClick={() => setRoute("projectChange")}>返回列表</Button>}>
            <Alert style={{ marginBottom: 16 }} type="info" showIcon message="变更编号自动生成，例如 PC-2026-0004；提交后进入审批中，并显示审批流程时间轴。" />
            <Form layout="vertical" initialValues={{ no: "PC-2026-0004", type: "交期变更", recalc: true, notify: true }}>
              <Row gutter={16}>
                <Col xs={24} md={8}><Form.Item label="变更编号"><Input value="PC-2026-0004" disabled /></Form.Item></Col>
                <Col xs={24} md={8}><Form.Item label="关联项目"><Select defaultValue="PJ-2026-0001"><Option value="PJ-2026-0001">光学耦合设备项目</Option><Option value="PJ-2026-0002">自动上下料设备项目</Option></Select></Form.Item></Col>
                <Col xs={24} md={8}><Form.Item label="变更类型" name="type"><Select><Option value="交期变更">交期变更</Option><Option value="技术要求变更">技术要求变更</Option><Option value="项目范围变更">项目范围变更</Option><Option value="负责人变更">负责人变更</Option><Option value="客户资料变更">客户资料变更</Option><Option value="其他">其他</Option></Select></Form.Item></Col>
                <Col xs={24}><Form.Item label="变更标题"><Input /></Form.Item></Col>
                <Col xs={24}><Form.Item label="变更原因"><TextArea rows={3} /></Form.Item></Col>
                <Col xs={24} md={12}><Form.Item label="变更前内容"><TextArea rows={4} placeholder="系统自动带出项目当前资料" /></Form.Item></Col>
                <Col xs={24} md={12}><Form.Item label="变更后内容"><TextArea rows={4} placeholder="请填写变更后的资料" /></Form.Item></Col>
                <Col xs={24}><Form.Item label="影响范围"><Checkbox.Group options={["成本", "交期", "采购", "设计", "装配", "调试", "客户验收"]} /></Form.Item></Col>
                <Col xs={24} md={12}><Form.Item label="是否需要重新计算项目节点" name="recalc"><Radio.Group><Radio.Button value={true}>是</Radio.Button><Radio.Button value={false}>否</Radio.Button></Radio.Group></Form.Item></Col>
                <Col xs={24} md={12}><Form.Item label="是否需要通知相关负责人" name="notify"><Radio.Group><Radio.Button value={true}>是</Radio.Button><Radio.Button value={false}>否</Radio.Button></Radio.Group></Form.Item></Col>
                <Col xs={24}><Form.Item label="附件分类"><Checkbox.Group options={["客户邮件", "技术协议", "会议纪要"]} /></Form.Item></Col>
                <Col xs={24}><Form.Item label="附件上传"><Upload><Button>上传附件</Button></Upload></Form.Item></Col>
                <Col xs={24}><Form.Item label="备注"><TextArea rows={3} /></Form.Item></Col>
              </Row>
              <Space>
                <Button onClick={() => message.success("变更草稿已保存")}>保存草稿</Button>
                <Button type="primary" onClick={() => message.success("项目信息变更已提交，当前状态：审批中")}>提交审批</Button>
              </Space>
              <Card style={{ marginTop: 16 }} title="提交后审批流程预览">
                <Steps current={1}>
                  <Step title="申请人提交" />
                  <Step title="项目经理审批" />
                  <Step title="研发负责人审批" />
                  <Step title="管理层审批" />
                  <Step title="自动更新资料并抄送" />
                </Steps>
              </Card>
            </Form>
          </Card>
        );
      }

      function ProjectChangeDetail({ change }) {
        const item = change || initialChanges[0];
        return (
          <div className="detail-grid">
            <div>
              <Card className="content-card" title="变更基本信息">
                <Descriptions column={2} bordered size="small">
                  <Descriptions.Item label="变更编号">{item.no}</Descriptions.Item>
                  <Descriptions.Item label="当前状态"><StatusTag status={item.status} /></Descriptions.Item>
                  <Descriptions.Item label="关联项目">{item.project}</Descriptions.Item>
                  <Descriptions.Item label="变更类型">{item.type}</Descriptions.Item>
                  <Descriptions.Item label="变更标题" span={2}>{item.title}</Descriptions.Item>
                  <Descriptions.Item label="变更原因" span={2}>{item.reason}</Descriptions.Item>
                </Descriptions>
              </Card>
              <Card className="content-card" title="变更前 / 变更后对比">
                <div className="compare-grid">
                  <div className="compare-box"><div className="compare-label">变更前</div>{item.before}</div>
                  <div className="compare-box"><div className="compare-label">变更后</div>{item.after}</div>
                </div>
                <Space wrap style={{ marginTop: 14 }}>
                  {(item.impact || ["图纸", "BOM", "客户交期"]).map((tag) => <Tag key={tag} color="blue">{tag}</Tag>)}
                </Space>
              </Card>
              <Card className="content-card" title="审批通过后模拟自动执行">
                <Timeline>
                  <Timeline.Item>自动更新项目资料</Timeline.Item>
                  <Timeline.Item>项目版本号递增</Timeline.Item>
                  <Timeline.Item>自动生成变更记录</Timeline.Item>
                  <Timeline.Item>自动抄送项目经理和相关负责人</Timeline.Item>
                </Timeline>
              </Card>
            </div>
            <div>
              <Card className="content-card" title="审批流程时间轴">
                <Steps direction="vertical" current={item.status === "approved" ? 4 : 1}>
                  <Step title="申请人提交" description={item.applicant} />
                  <Step title="项目经理审批" description="当前节点或已完成" />
                  <Step title="研发负责人审批" />
                  <Step title="管理层审批" />
                  <Step title="自动更新资料并归档" />
                </Steps>
              </Card>
              <Card className="content-card" title="审批操作">
                <Space wrap>
                  <Button type="primary" onClick={() => message.success("审批通过，项目资料已模拟更新")}>通过</Button>
                  <Button danger onClick={() => message.warning("驳回时必须填写原因")}>驳回</Button>
                  <Button onClick={() => message.info("已退回申请人补充资料")}>退回</Button>
                </Space>
              </Card>
            </div>
          </div>
        );
      }

      function FlowConfig() {
        const data = [
          {
            key: 1,
            name: "ECN 变更审批流程",
            type: "ECN_APPROVAL",
            nodes: "申请人提交 → 研发负责人审批 → 项目经理确认影响 → 执行负责人处理 → 验证负责人确认 → 自动归档并抄送项目经理",
            roles: "研发负责人 / 项目经理 / 执行负责人 / 验证负责人",
            timeout: "24 小时",
            cc: "项目经理、申请人、执行负责人",
            action: "自动归档、自动抄送、生成 ECN 记录",
          },
          {
            key: 2,
            name: "新项目下单审批流程",
            type: "PROJECT_ORDER_APPROVAL",
            nodes: "申请人提交 → 项目经理确认 → 研发负责人确认资源 → 老板/管理层审批 → 自动生成项目编号 → 进入待导入项目池",
            roles: "项目经理 / 研发负责人 / 管理层",
            timeout: "24 小时",
            cc: "机械、电气、软件负责人",
            action: "自动生成项目编号、进入待导入项目池、抄送负责人",
          },
          {
            key: 3,
            name: "项目信息变更审批流程",
            type: "PROJECT_CHANGE_APPROVAL",
            nodes: "申请人提交 → 项目经理审批 → 研发负责人审批 → 老板/管理层审批 → 自动更新项目资料 → 自动生成变更记录",
            roles: "项目经理 / 研发负责人 / 管理层",
            timeout: "24 小时",
            cc: "项目经理、相关节点负责人",
            action: "自动更新项目资料、版本递增、生成变更记录、自动抄送",
          },
        ];
        const columns = [
          { title: "流程名称", dataIndex: "name", width: 210, fixed: "left" },
          { title: "适用类型", dataIndex: "type", width: 210 },
          { title: "审批节点", dataIndex: "nodes", width: 480 },
          { title: "审批角色", dataIndex: "roles", width: 260 },
          { title: "是否启用", width: 90, render: () => <Tag color="green">启用</Tag> },
          { title: "超时提醒时间", dataIndex: "timeout", width: 130 },
          { title: "自动抄送对象", dataIndex: "cc", width: 230 },
          { title: "自动动作", dataIndex: "action", width: 300 },
          { title: "操作", width: 90, fixed: "right", render: () => <Button size="small">编辑</Button> },
        ];
        return (
          <>
            <AutoTags />
            <Card className="content-card" title="审批流程配置">
              <Table columns={columns} dataSource={data} scroll={{ x: 2200 }} pagination={false} />
            </Card>
          </>
        );
      }

      function App() {
        const [route, setRoute] = React.useState("workbench");
        const [projects, setProjects] = React.useState(initialProjects);
        const [importPool, setImportPool] = React.useState(initialImportPool);
        const [changes, setChanges] = React.useState(initialChanges);
        const [currentApproval, setCurrentApproval] = React.useState(approvalRows[0]);
        const [currentProject, setCurrentProject] = React.useState(null);
        const [currentChange, setCurrentChange] = React.useState(initialChanges[0]);
        const [nodeModal, setNodeModal] = React.useState(null);
        const meta = pageMeta[route] || pageMeta.workbench;

        const selectedKey = {
          ecnForm: "ecn",
          projectOrderForm: "projectOrder",
          projectChangeForm: "projectChange",
          projectChangeDetail: "projectChange",
          approvalDetail: "workbench",
        }[route] || route;

        const menuItems = [
          { key: "workbench", label: "审批工作台" },
          { key: "mine", label: "我发起的审批" },
          { key: "cc", label: "抄送我的审批" },
          { key: "ecn", label: "ECN 变更审批" },
          { key: "projectOrder", label: "新项目下单审批" },
          { key: "projectProgress", label: "项目进度管控" },
          { key: "projectChange", label: "项目信息变更" },
          { key: "flowConfig", label: "审批流程配置" },
        ];

        const updateProject = (updatedProject) => {
          setProjects(projects.map((item) => item.no === updatedProject.no ? updatedProject : item));
          setCurrentProject(updatedProject);
        };

        const markNodeComplete = (project, node) => {
          const updated = {
            ...project,
            progress: Math.min(100, project.progress + 8),
            lastChangedAt: moment().format("YYYY-MM-DD HH:mm"),
            nodes: project.nodes.map((item) => item.key === node.key ? { ...item, status: "completed", actualDate: moment().format("YYYY-MM-DD"), remark: "节点已完成，系统自动生成操作记录" } : item),
          };
          updateProject(updated);
          message.success("节点已标记完成，并生成操作记录");
        };

        const editNode = (project, node) => {
          setNodeModal({ project, node });
        };

        const saveNodeEdit = () => {
          if (!nodeModal) return;
          const { project, node } = nodeModal;
          const updated = {
            ...project,
            lastChangedAt: moment().format("YYYY-MM-DD HH:mm"),
            nodes: project.nodes.map((item) => item.key === node.key ? { ...item, remark: "节点已编辑，系统自动生成操作记录并通知负责人" } : item),
          };
          updateProject(updated);
          setNodeModal(null);
          message.success("节点已编辑，并生成操作记录");
        };

        const renderPage = () => {
          if (route === "workbench") return <Workbench setRoute={setRoute} setCurrentApproval={setCurrentApproval} />;
          if (route === "mine") return <SimpleApprovalList title="我发起的审批" data={approvalRows.slice(1)} setRoute={setRoute} setCurrentApproval={setCurrentApproval} />;
          if (route === "cc") return <SimpleApprovalList title="抄送我的审批" data={approvalRows.filter((item) => item.status !== "pending")} setRoute={setRoute} setCurrentApproval={setCurrentApproval} />;
          if (route === "ecn") return <EcnList setRoute={setRoute} setCurrentChange={setCurrentChange} />;
          if (route === "ecnForm") return <EcnForm setRoute={setRoute} />;
          if (route === "projectOrder") return <ProjectOrderList setRoute={setRoute} />;
          if (route === "projectOrderForm") return <ProjectOrderForm setRoute={setRoute} />;
          if (route === "projectProgress") return <ProjectProgress projects={projects} importPool={importPool} setProjects={setProjects} setImportPool={setImportPool} setRoute={setRoute} setCurrentProject={setCurrentProject} />;
          if (route === "projectChange") return <ProjectChangeList changes={changes} setRoute={setRoute} setCurrentChange={setCurrentChange} />;
          if (route === "projectChangeForm") return <ProjectChangeForm setRoute={setRoute} />;
          if (route === "projectChangeDetail") return <ProjectChangeDetail change={currentChange} />;
          if (route === "flowConfig") return <FlowConfig />;
          if (route === "approvalDetail") return <ApprovalDetail currentApproval={currentApproval} />;
          return <Workbench setRoute={setRoute} setCurrentApproval={setCurrentApproval} />;
        };

        return (
          <Layout className="app-layout">
            <Sider width={260} className="app-sider">
              <div className="brand">
                <div className="brand-mark">审</div>
                <div>
                  <div className="brand-title">工程审批管控</div>
                  <div className="brand-subtitle">审批 / 进度 / 变更闭环</div>
                </div>
              </div>
              <Menu theme="dark" mode="inline" selectedKeys={[selectedKey]} items={menuItems} onClick={({ key }) => setRoute(key)} />
              <div className="user-block">
                <Avatar style={{ background: "#dbeafe", color: "#17325f" }}>张</Avatar>
                <div>
                  <div>张三</div>
                  <div className="user-role">项目成员 / 审批人</div>
                </div>
              </div>
            </Sider>
            <Layout>
              <Header className="app-header">
                <div className="header-row">
                  <div>
                    <h1 className="page-title">{meta[0]}</h1>
                    <div className="page-subtitle">{meta[1]}</div>
                  </div>
                  <Space wrap>
                    <Button onClick={() => message.info("已切换演示身份：项目经理")}>切换身份</Button>
                    <Button type="primary" onClick={() => setRoute("ecnForm")}>新建 ECN</Button>
                    <Button type="primary" ghost onClick={() => setRoute("projectOrderForm")}>新建项目下单</Button>
                    <Button onClick={() => setRoute("projectChangeForm")}>发起项目变更</Button>
                  </Space>
                </div>
              </Header>
              <Content className="app-content">{renderPage()}</Content>
            </Layout>
            <ProjectDrawer
              project={currentProject}
              onClose={() => setCurrentProject(null)}
              onNodeComplete={markNodeComplete}
              onNodeEdit={editNode}
              setRoute={setRoute}
            />
            <Modal title="编辑项目节点" open={!!nodeModal} onCancel={() => setNodeModal(null)} onOk={saveNodeEdit} okText="保存并生成记录" cancelText="取消">
              {nodeModal && (
                <Form layout="vertical">
                  <Form.Item label="节点名称"><Input defaultValue={nodeModal.node.name} /></Form.Item>
                  <Form.Item label="计划完成时间"><DatePicker style={{ width: "100%" }} defaultValue={moment(nodeModal.node.planDate)} /></Form.Item>
                  <Form.Item label="负责人"><Input defaultValue={nodeModal.node.owner} /></Form.Item>
                  <Form.Item label="备注"><TextArea rows={3} defaultValue={nodeModal.node.remark} /></Form.Item>
                </Form>
              )}
            </Modal>
          </Layout>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
